<?xml version="1.0" encoding="UTF-8"?>
<?xml-stylesheet href="chrome://global/skin/global.css" type="text/css"?>
<!--
  ZotAssets role editor dialog.
  Receives a data object via window.arguments[0]; writes data.confirmed and
  data.selectedRoleId back to the caller. See content/modules/dialog.js.
-->
<dialog
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  id="zotassets-role-dialog"
  buttons="accept,cancel"
  style="min-width: 360px;"
  onload="ZotAssetsDialog.onLoad();"
  ondialogaccept="return ZotAssetsDialog.onAccept();"
>
  <script src="roleDialog.js" />

  <vbox style="padding: 12px;">
    <description id="za-heading" style="font-weight: bold; margin-bottom: 8px;">Asset role</description>

    <hbox align="center" style="margin-bottom: 4px;">
      <label id="za-attachment-label" value="Attachment:" style="min-width: 90px;" />
      <label id="za-attachment-name" crop="end" flex="1" />
    </hbox>

    <hbox align="center" style="margin-bottom: 10px;">
      <label id="za-current-label" value="Current role:" style="min-width: 90px;" />
      <label id="za-current-value" style="font-weight: bold;" />
    </hbox>

    <label id="za-select-label" value="Select a new role:" style="margin-bottom: 4px;" />
    <menulist id="za-role-list" flex="1">
      <menupopup id="za-role-popup" />
    </menulist>
  </vbox>
</dialog>
